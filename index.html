<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f18 65%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .art-title {
            margin: 0;
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff6ec7, #ffd166, #7afcff, #b388ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 110, 199, 0.35), 0 0 35px rgba(122, 252, 255, 0.25);
        }
    </style>
</head>
<body>
    <h1 class="art-title">Hello World</h1>
</body>
</html>
